version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sgh-db
    environment:
      POSTGRES_DB: horarios
      POSTGRES_USER: horarios_user
      POSTGRES_PASSWORD: horarios123
    volumes:
      - sgh_postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: sgh-backend
    environment:
      - DATABASE_URL=postgresql://horarios_user:horarios123@db/horarios
    restart: always
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: sgh-nginx
    volumes:
      - .:/usr/share/nginx/html
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      - backend

volumes:
  sgh_postgres_data:
