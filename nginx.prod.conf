server {
    listen 80;
    server_name sgh.accesovirtual.com.ar;
    
    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sgh.accesovirtual.com.ar;

    # Configuración de Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sgh.accesovirtual.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgh.accesovirtual.com.ar/privkey.pem;

    # Optimización SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    underscores_in_headers on;

    # Frontend estático
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pasar encabezado de autenticación
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
}
