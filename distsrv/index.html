<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios - Centro de Documentación</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #f0f4f8;
            --sidebar-bg: #e3e9f0;
            --accent: #a0c4ff;
            --text: #4a5568;
            --white: #ffffff;
            --pastel-blue: #d6e4ff;
            --pastel-green: #d1fae5;
            --pastel-red: #ffd6d6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text);
            background-color: var(--primary);
        }

        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #cbd5e0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #5a67d8;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .file-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: var(--white);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .file-item:hover {
            transform: translateX(5px);
            background: var(--pastel-blue);
        }

        .file-item.active {
            background: var(--accent);
            color: var(--white);
            font-weight: bold;
        }

        .file-item-header {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 5px;
        }

        .btn-refresh,
        .btn-explore,
        .btn-pdf {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-refresh {
            background-color: var(--pastel-blue);
            color: #2b6cb0;
        }

        .btn-explore {
            background-color: var(--pastel-green);
            color: #065f46;
        }

        .btn-pdf {
            background-color: var(--pastel-red);
            color: #991b1b;
        }

        .btn-explore:hover,
        .btn-pdf:hover,
        .btn-refresh:hover {
            opacity: 0.8;
        }

        #content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: var(--white);
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            scroll-behavior: smooth;
        }

        .markdown-body {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .markdown-body h1 {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            color: #5a67d8;
        }

        .markdown-body blockquote {
            background: var(--primary);
            border-left: 5px solid var(--accent);
            padding: 10px 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body pre {
            background: #2d3748;
            color: #edf2f7;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .markdown-body code {
            background: #edf2f7;
            padding: 2px 4px;
            border-radius: 4px;
            color: #2d3748;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 12px;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #e2e8f0;
            margin-left: auto;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <h2>Documentacion</h2>
        <ul class="file-list" id="fileList">
            <li class="file-item active" onclick="loadManual('manual_maestro.md')">
                <div class="file-item-header">
                    <span>Manual Maestro Integral</span>
                    <span id="updateStatus" class="status-badge">Auto-refresh activo</span>
                </div>
            </li>
            <li class="file-item" onclick="loadManual('../docs/manual_general.md')">
                <div class="file-item-header">
                    <span>Manual General del Sistema</span>
                </div>
            </li>
        </ul>

        <button class="btn-refresh" onclick="loadManual('manual')">Refrescar ahora</button>

        <input type="file" id="filePicker" accept=".md" style="display: none;" onchange="handleFileSelect(event)">
        <button class="btn-explore" onclick="document.getElementById('filePicker').click()">Explorar otro
            archivo</button>

        <button class="btn-pdf" id="downloadPdfBtn" style="display: flex;" onclick="downloadAsPDF()">Descargar como
            PDF</button>
    </div>

    <div id="content">
        <div id="mdContainer" class="markdown-body"></div>
    </div>

    <script>
        const container = document.getElementById('mdContainer');
        const statusBadge = document.getElementById('updateStatus');
        let currentTitle = 'Manual Maestro';
        let lastContent = '';

        async function loadManual(filePath = 'manual_maestro.md') {
            // Si estamos abriendo el archivo localmente (file://), el navegador bloquea el auto-refresco por seguridad (CORS)
            if (window.location.protocol === 'file:') {
                statusBadge.innerText = 'Modo Local';
                statusBadge.style.background = '#ffd6d6';
                return;
            }

            try {
                const response = await fetch(filePath + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('No se pudo cargar el archivo');

                const text = await response.text();

                if (text !== lastContent) {
                    lastContent = text;
                    container.innerHTML = marked.parse(text);
                    setupAnchors();
                    statusBadge.innerText = 'Actualizado: ' + new Date().toLocaleTimeString();
                    statusBadge.style.background = '#d1fae5';
                    
                    // Marcar item activo en el sidebar
                    document.querySelectorAll('.file-item').forEach(item => {
                        const onclickAttr = item.getAttribute('onclick');
                        if (onclickAttr && onclickAttr.includes(filePath)) {
                            item.classList.add('active');
                        } else {
                            item.classList.remove('active');
                        }
                    });
                }
            } catch (err) {
                if (window.location.protocol !== 'file:') {
                    console.error(err);
                    statusBadge.innerText = 'Error de conexión';
                }
            }
        }

        function setupAnchors() {
            container.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.onclick = (e) => {
                    e.preventDefault();
                    const id = anchor.getAttribute('href').substring(1);
                    const target = document.getElementById(id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                };
            });
        }

        // Carga inicial
        window.onload = () => {
            loadManual();
            // Polling cada 3 segundos para refresco automático
            setInterval(loadManual, 3000);
        };

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentTitle = file.name.replace('.md', '');
                container.innerHTML = marked.parse(e.target.result);
                container.scrollTop = 0;
                setupAnchors();
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                statusBadge.innerText = 'Viendo archivo local';
            };
            reader.readAsText(file);
        }

        function downloadAsPDF() {
            const fileName = `Horarios - ${currentTitle}.pdf`;
            const opt = {
                margin: 10,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(container).save();
        }
    </script>
</body>

</html>
